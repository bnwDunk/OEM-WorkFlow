services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME:-oem_app}
    volumes:
      - oem_mysql_data:/var/lib/mysql
      - ${BACKEND_CONTEXT:-../OEM-backend}/database/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ${BACKEND_CONTEXT:-../OEM-backend}
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      workflow-sync:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      PORT: 4000
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:-http://localhost:8088}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      DB_NAME: ${DB_NAME:-oem_app}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      ACCESS_TOKEN_EXPIRES_IN: ${ACCESS_TOKEN_EXPIRES_IN:-15m}
      REFRESH_TOKEN_EXPIRES_IN: ${REFRESH_TOKEN_EXPIRES_IN:-7d}
    expose:
      - "4000"

  workflow-sync:
    build:
      context: ${BACKEND_CONTEXT:-../OEM-backend}
      dockerfile: Dockerfile
    depends_on:
      mysql:
        condition: service_healthy
    command: ["npm", "run", "sync:workflow"]
    environment:
      NODE_ENV: production
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      DB_NAME: ${DB_NAME:-oem_app}
    volumes:
      - ./oem-workflow/src/data/oemWorkflow.ts:/OEM/oem-workflow/src/data/oemWorkflow.ts:ro

  frontend:
    build:
      context: ./oem-workflow
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${APP_PORT:-8088}:80"

volumes:
  oem_mysql_data:
