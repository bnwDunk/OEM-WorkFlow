services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME:-oem_app}
    volumes:
      - oem_mysql_data:/var/lib/mysql
      - ${BACKEND_CONTEXT:-../../OEM-backend}/database/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  phpmyadmin:
    image: phpmyadmin:5.2-apache
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      UPLOAD_LIMIT: ${PHPMYADMIN_UPLOAD_LIMIT:-128M}
    ports:
      - "${PHPMYADMIN_PORT:-8089}:80"

  backend:
    build:
      context: ${BACKEND_CONTEXT:-../../OEM-backend}
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      workflow-sync:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      PORT: 4000
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:-http://localhost:8088}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      DB_NAME: ${DB_NAME:-oem_app}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      ACCESS_TOKEN_EXPIRES_IN: ${ACCESS_TOKEN_EXPIRES_IN:-15m}
      REFRESH_TOKEN_EXPIRES_IN: ${REFRESH_TOKEN_EXPIRES_IN:-7d}
      MAIL_ENABLED: ${MAIL_ENABLED}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SECURE: ${SMTP_SECURE}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      MAIL_FROM: ${MAIL_FROM}
      APP_URL: ${APP_URL}
    expose:
      - "4000"

  workflow-sync:
    build:
      context: ${BACKEND_CONTEXT:-../../OEM-backend}
      dockerfile: Dockerfile
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    command: ["npm", "run", "sync:workflow"]
    environment:
      NODE_ENV: production
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      DB_NAME: ${DB_NAME:-oem_app}
    volumes:
      - ${FRONTEND_WORKFLOW_FILE:-./src/data/oemWorkflow.ts}:/OEM/oem-workflow/src/data/oemWorkflow.ts:ro

  db-migrate:
    build:
      context: ${BACKEND_CONTEXT:-../../OEM-backend}
      dockerfile: Dockerfile
    depends_on:
      mysql:
        condition: service_healthy
    command: ["npm", "run", "migrate:prod"]
    environment:
      NODE_ENV: production
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      DB_NAME: ${DB_NAME:-oem_app}

  frontend:
    build:
      context: ${FRONTEND_CONTEXT:-.}
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${APP_PORT:-8088}:80"

volumes:
  oem_mysql_data:
